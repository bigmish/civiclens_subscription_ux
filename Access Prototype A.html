<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Civic Lens — Access Prototype A</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
  * , *::before, *::after { box-sizing: border-box; }
  html, body, #root { margin: 0; padding: 0; height: 100%; }

  /* ── Civic Lens pricing page ───────────────────────── */
  .cl {
    width: 100%;
    background: #ffffff;
    font-family: 'Hind', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #24292f;
    -webkit-font-smoothing: antialiased;
  }
  .cl-wrap { max-width: 1010px; margin: 0 auto; }
  .cl-header { border-bottom: 1px solid #eef0f2; }
  .cl-header-wrap { display: flex; align-items: center; justify-content: space-between; padding: 19px 0; }
  .cl-logo { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; color: #24292f; white-space: nowrap; flex-shrink: 0; }
  .cl-nav { display: flex; align-items: center; gap: 34px; }
  .cl-nav-link { font-size: 15px; font-weight: 500; color: #424a53; text-decoration: none; }
  .cl-nav-link:hover { color: #24292f; }
  .cl-getstarted {
    font-family: inherit; font-size: 14px; font-weight: 600; color: #fff;
    background: #1f2328; border: 1px solid #1f2328; border-radius: 7px;
    padding: 9px 18px; cursor: pointer; box-shadow: 0 1px 2px rgba(27,31,36,0.05);
    margin-left: 6px; white-space: nowrap;
  }
  .cl-hero { text-align: center; padding: 44px 0 0; }
  .cl-h1 { margin: 0; font-size: 60px; font-weight: 700; line-height: 1.04; letter-spacing: -0.025em; color: #24292f; }
  .cl-hero-sub { margin: 16px auto 0; max-width: 560px; font-size: 18px; line-height: 1.5; color: #57606a; }
  .cl-free-slot { min-height: 110px; margin-top: 22px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .cl-table-wrap { margin-top: var(--cl-gap, 16px); }
  .cl-table { display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid #e6e9ec; border-radius: 20px; background: #fff; box-shadow: 0 1px 3px rgba(27,31,36,0.06); overflow: hidden; }
  .cl-col { padding: 34px 26px 40px; }
  .cl-plan-name { margin: 0; font-size: 27px; font-weight: 700; color: #24292f; letter-spacing: -0.01em; }
  .cl-plan-desc { margin: 12px 0 0; font-size: 15px; line-height: 1.45; color: #57606a; min-height: 44px; }
  .cl-price { margin-top: 24px; display: flex; align-items: flex-start; }
  .cl-price-amt { font-size: 46px; font-weight: 700; line-height: 1; color: #24292f; letter-spacing: -0.02em; }
  .cl-price-cur { font-size: 12px; font-weight: 600; color: #57606a; margin-left: 4px; top: -0.2em; }
  .cl-price-sub { margin: 12px 0 0; font-size: 14px; color: #57606a; }
  .cl-btn { width: 100%; margin-top: 22px; padding: 12px; border-radius: 8px; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; border: 1px solid transparent; }
  .cl-btn-solid { background: #1f2328; color: #fff; border-color: #1f2328; }
  .cl-btn-solid:hover { background: #15181c; }
  .cl-btn-outline { background: #fff; color: #24292f; border-color: #d0d7de; }
  .cl-btn-outline:hover { background: #f6f8fa; }
  .cl-col-divider { border-top: 1px solid #ededf0; margin: 26px 0 18px; }
  .cl-included { display: flex; align-items: center; font-size: 15px; font-weight: 700; color: #24292f; margin-bottom: 16px; white-space: nowrap; }
  .cl-features { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 13px; }
  .cl-feature { display: flex; gap: 10px; align-items: flex-start; }
  .cl-fi-ic { flex-shrink: 0; margin-top: 2px; }
  .cl-feature-txt { font-size: 14.5px; line-height: 1.4; color: #424a53; }
  .cl-feature-off { color: #8a929c; }
  .cl-elig { background: #f6f8fa; margin-top: 64px; padding: 78px 0; }
  .cl-elig-inner { text-align: center; }
  .cl-elig-h { margin: 0; font-size: 40px; font-weight: 700; color: #24292f; letter-spacing: -0.02em; }
  .cl-elig-p { margin: 22px auto 0; max-width: 620px; font-size: 16px; line-height: 1.6; color: #57606a; }
  .cl-footer { background: #fff; padding: 52px 0 0; }
  .cl-footer-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .cl-footer-dev { margin-top: 14px; font-size: 14px; color: #57606a; display: flex; align-items: center; }
  .cl-footer-devlink { color: #24292f; font-weight: 600; text-decoration: none; }
  .cl-footer-cols { display: flex; gap: 64px; }
  .cl-footer-col { display: flex; flex-direction: column; gap: 12px; }
  .cl-footer-col-h { font-size: 14px; font-weight: 700; color: #24292f; margin-bottom: 4px; }
  .cl-footer-link { font-size: 14px; color: #57606a; text-decoration: none; display: inline-flex; align-items: center; }
  .cl-footer-link:hover { color: #24292f; }
  .cl-footer-bottom { margin-top: 46px; border-top: 1px solid #eef0f2; padding: 22px 0 30px; text-align: center; font-size: 13px; color: #57606a; }

  /* Free callout A */
  .fc-link { color: #0969da; text-decoration: none; font-weight: 600; white-space: nowrap; }
  .fc-link:hover { text-decoration: underline; }
  .fcA { text-align: center; }
  .fcA-big { font-size: 38px; font-weight: 700; line-height: 1.08; letter-spacing: -0.02em; color: #0969da; }
  .fcA-sub { margin-top: 8px; font-size: 19px; color: #57606a; }

  /* Login screen */
  .login-page { min-height: 100vh; display: flex; flex-direction: column; background: #fff;
    font-family: 'Hind', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #24292f; }
  .login-header { border-bottom: 1px solid #eef0f2; padding: 17px 32px; display: flex; align-items: center; }
  .login-logo { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; white-space: nowrap; }
  .login-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }
  .login-card { width: 100%; max-width: 360px; }
  .login-h { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin: 0; color: #111; line-height: 1.2; }
  .login-label { font-size: 13px; font-weight: 600; color: #24292f; display: block; margin-bottom: 6px; }
  .login-input { width: 100%; font-family: inherit; font-size: 15px; color: #24292f; background: #fff;
    border: 1px solid #d0d7de; border-radius: 7px; padding: 10px 13px; outline: none; transition: border-color 0.15s; }
  .login-input:focus { border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,0.12); }
  .login-btn-email { width: 100%; margin-top: 14px; background: #0969da; color: #fff; border: none;
    border-radius: 7px; padding: 12px; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; }
  .login-btn-email:hover { background: #0860c4; }
  .login-divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: #8a929c; font-size: 13px; }
  .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: #e6e9ec; }
  .login-alts { display: flex; flex-direction: column; gap: 10px; }
  .login-alt-btn { width: 100%; background: #fff; color: #24292f; border: 1px solid #d0d7de; border-radius: 7px;
    padding: 11px 14px; font-family: inherit; font-size: 14px; font-weight: 400; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 9px; white-space: nowrap; }
  .login-alt-btn:hover { background: #f6f8fa; }
  .login-terms { margin-top: 22px; font-size: 12px; color: #8a929c; line-height: 1.55; }
  .login-terms-link { color: #0969da; text-decoration: none; }
  .login-terms-link:hover { text-decoration: underline; }
  .login-signin-row { margin-top: 24px; font-size: 13px; color: #57606a; }
  .login-textarea { width: 100%; font-family: inherit; font-size: 14px; color: #24292f; background: #fff;
    border: 1px solid #d0d7de; border-radius: 7px; padding: 10px 13px; outline: none;
    resize: vertical; min-height: 90px; transition: border-color 0.15s; }
  .login-textarea:focus { border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,0.12); }
  .login-select { width: 100%; font-family: inherit; font-size: 14px; color: #57606a; background: #fff;
    border: 1px solid #d0d7de; border-radius: 7px; padding: 10px 13px; outline: none; cursor: pointer;
    appearance: auto; }
  .login-select:focus { border-color: #0969da; }
  .login-section-h { font-size: 14px; font-weight: 700; color: #24292f; margin: 0 0 6px; }
  .login-org-card { max-width: 480px; }

  /* Apply screen — V2 two-panel */
  .apply-page { background: #fff; min-height: 100vh; font-family: 'Hind', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #24292f; }
  .apply-wrap-wide { max-width: 960px; margin: 0 auto; padding: 52px 40px 96px; }
  .apply-grid { display: grid; grid-template-columns: 280px 1fr; gap: 56px; align-items: flex-start; }
  .apply-plan-card { background: #f6f8fa; border: 1px solid #e6e9ec; border-radius: 12px; padding: 24px; position: sticky; top: 24px; }
  .apply-plan-eyebrow { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #57606a; margin-bottom: 8px; }
  .apply-plan-name { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 4px; }
  .apply-plan-price { font-size: 15px; color: #57606a; margin-bottom: 20px; }
  .apply-plan-divider { border: none; border-top: 1px solid #e6e9ec; margin: 18px 0; }
  .apply-plan-item { font-size: 13px; color: #57606a; display: flex; gap: 7px; margin-bottom: 7px; }
  .apply-plan-tick { color: #1a7f37; font-weight: 700; }
  .apply-plan-note { font-size: 12px; color: #8a929c; }
  .apply-h { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 6px; color: #111; }
  .apply-intro { font-size: 15px; color: #57606a; line-height: 1.65; margin: 0 0 28px; }
  .apply-field { margin-bottom: 14px; }
  .apply-field-label { font-size: 12px; color: #57606a; margin-bottom: 2px; font-weight: 600; display: block; }
  .apply-field-val { font-size: 14.5px; color: #24292f; line-height: 1.5; }
  .apply-next-h { font-size: 15px; font-weight: 700; color: #24292f; margin: 28px 0 6px; }
  .apply-next-p { font-size: 14px; color: #57606a; line-height: 1.6; margin: 0 0 24px; }
  .apply-actions { display: flex; align-items: center; gap: 20px; }
  .apply-btn { background: #0969da; color: #fff; border: none; border-radius: 8px; padding: 13px 28px; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; }
  .apply-btn:hover { background: #0860c4; }
  .apply-secondary-link { font-size: 15px; font-weight: 500; color: #57606a; cursor: pointer; text-decoration: none; border-bottom: 1px solid #d0d7de; padding-bottom: 1px; }
  .apply-secondary-link:hover { color: #24292f; border-color: #57606a; }

  /* Pending sidebar card — V3 progress bar */
  .pending-card { margin-top: auto; border: 1px solid #e6e9ec; border-radius: 10px; padding: 12px; }
  .pending-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #57606a; margin-bottom: 9px; }
  .pending-bar { height: 5px; border-radius: 3px; background: #e6e9ec; overflow: hidden; margin-bottom: 6px; }
  .pending-fill { height: 100%; width: 14%; background: #24292f; border-radius: 3px; }
  .pending-range { display: flex; justify-content: space-between; font-size: 10.5px; color: #8a929c; margin-bottom: 10px; }
  .pending-range b { color: #24292f; font-weight: 700; }
  .pending-sub { font-size: 11px; color: #57606a; margin-bottom: 9px; line-height: 1.45; }
  .pending-btn { width: 100%; background: #1f2328; color: #fff; border: 1px solid #1f2328; border-radius: 6px; padding: 7px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .pending-btn:hover { background: #15181c; }
</style>
</head>
<body>
<script src="auth.js"></script>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const CL_PLANS = [
  {
    name: 'Basic',
    desc: 'For small newsrooms and research teams',
    price: '$100',
    sub: 'per month / $1,000 per year',
    cta: 'Subscribe',
    ctaStyle: 'solid',
    features: [
      { t: 'Everything in Free, plus:', ok: true },
      { t: 'Full monitoring access', ok: true },
      { t: 'Unlimited searches with filters', ok: true },
      { t: 'Up to 5 team members', ok: true },
      { t: '1 hour onboarding', ok: true },
      { t: 'No channel tracking credits', ok: false },
    ],
  },
  {
    name: 'Standard',
    desc: 'For growing organizations and research institutions',
    price: '$500',
    sub: 'per month / $5,000 per year',
    cta: 'Subscribe',
    ctaStyle: 'solid',
    features: [
      { t: 'Everything in Basic, plus:', ok: true },
      { t: '500 channel tracking credits/year', ok: true },
      { t: 'Access to 5 Public Actor Sets', ok: true },
      { t: '25 private Lists', ok: true },
      { t: 'Unlimited SMS-based tiplines', ok: true },
      { t: '50 CSV exports per month', ok: true },
      { t: 'Up to 10 team members', ok: true },
    ],
  },
  {
    name: 'Advanced',
    desc: 'For large newsrooms and advanced research teams',
    price: '$1,000',
    sub: 'per month / $10,000 per year',
    cta: 'Subscribe',
    ctaStyle: 'solid',
    features: [
      { t: 'Everything in Standard, plus:', ok: true },
      { t: '1,000 channel tracking credits/year', ok: true },
      { t: 'API rate limit of 500 requests/hour', ok: true },
      { t: 'Access to 10 Public Actor Sets', ok: true },
      { t: '10 Projects with content labeling', ok: true },
      { t: 'Create up to 5 Public Dashboards', ok: true },
      { t: 'Up to 50 private Lists', ok: true },
      { t: '500 CSV exports per month', ok: true },
      { t: 'Up to 25 team members', ok: true },
    ],
  },
  {
    name: 'Pro',
    desc: 'For enterprise organizations and data-driven institutions',
    price: '$2,500',
    sub: 'per month / $25,000 per year',
    cta: 'Contact Sales',
    ctaStyle: 'outline',
    features: [
      { t: 'Everything in Advanced, plus:', ok: true },
      { t: '10,000 channel tracking credits/year', ok: true },
      { t: 'API rate limit of 5,000 requests/hour', ok: true },
      { t: 'Private Actor Sets and unlimited Public Actor Sets', ok: true },
      { t: 'Unlimited Projects and Pipelines', ok: true },
      { t: 'Unlimited Public and Private Dashboards', ok: true },
      { t: 'Up to 100 private Lists', ok: true },
      { t: 'Unlimited CSV exports', ok: true },
      { t: 'Up to 50 team members', ok: true },
    ],
  },
];

function ClCheck() {
  return (
    <svg className="cl-fi-ic" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <path d="M13.5 4.5 6.5 11.5 2.75 7.75" stroke="#2da44e" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}
function ClX() {
  return (
    <svg className="cl-fi-ic" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <path d="M4 4l8 8M12 4l-8 8" stroke="#8a929c" strokeWidth="1.7" strokeLinecap="round" />
    </svg>
  );
}
function ClChevronUp() {
  return (
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true" style={{ marginRight: 7 }}>
      <path d="M4 10l4-4 4 4" stroke="#24292f" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}
function ClChevronRight() {
  return (
    <svg width="12" height="12" viewBox="0 0 16 16" fill="none" aria-hidden="true" style={{ marginLeft: 5, opacity: 0.55 }}>
      <path d="M6 4l4 4-4 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function ClPlanColumn({ plan, idx, onSubscribe }) {
  return (
    <div className="cl-col" style={{ borderLeft: idx === 0 ? 'none' : '1px solid #ededf0' }}>
      <h3 className="cl-plan-name">{plan.name}</h3>
      <p className="cl-plan-desc">{plan.desc}</p>
      <div className="cl-price">
        <span className="cl-price-amt">{plan.price}</span>
        <sup className="cl-price-cur">USD</sup>
      </div>
      <p className="cl-price-sub">{plan.sub}</p>
      {plan.ctaStyle === 'solid' ? (
        onSubscribe ? (
          <button className="cl-btn cl-btn-solid" onClick={() => onSubscribe(plan.name)}>{plan.cta}</button>
        ) : (
          <a className="cl-btn cl-btn-solid" href={`monitoring_membership_confirmation.html?plan=${encodeURIComponent(plan.name)}`} style={{ display: 'block', textAlign: 'center', textDecoration: 'none' }}>{plan.cta}</a>
        )
      ) : (
        <button className="cl-btn cl-btn-outline">{plan.cta}</button>
      )}
      <div className="cl-col-divider"></div>
      <div className="cl-included"><ClChevronUp />What's included</div>
      <ul className="cl-features">
        {plan.features.map((f, i) => (
          <li className="cl-feature" key={i}>
            {f.ok ? <ClCheck /> : <ClX />}
            <span className={f.ok ? 'cl-feature-txt' : 'cl-feature-txt cl-feature-off'}>{f.t}</span>
          </li>
        ))}
      </ul>
    </div>
  );
}

function PricingPage({ freeCallout, onSubscribe, onGetStarted }) {
  return (
    <div className="cl">
      {/* Header */}
      <header className="cl-header">
        <div className="cl-wrap cl-header-wrap">
          <div className="cl-logo">Civic Lens</div>
          <nav className="cl-nav">
            <a className="cl-nav-link" href="#">Features</a>
            <a className="cl-nav-link" href="#">Pricing</a>
            <a className="cl-nav-link" href="#">FAQ</a>
            <a className="cl-nav-link" href="#">Dashboard</a>
            {onGetStarted ? (
              <button className="cl-getstarted" onClick={onGetStarted}>Get Started</button>
            ) : (
              <a className="cl-getstarted" href="monitoring_membership_confirmation.html" style={{ textDecoration: 'none', display: 'inline-block' }}>Get Started</a>
            )}
          </nav>
        </div>
      </header>

      {/* Hero */}
      <section className="cl-hero">
        <h1 className="cl-h1">Choose your plan</h1>
        <p className="cl-hero-sub">From individual researchers to enterprise teams, we have a plan that fits your needs.</p>
      </section>

      {/* Free callout slot — only renders when a callout is provided */}
      {freeCallout && <div className="cl-wrap cl-free-slot">{freeCallout}</div>}

      {/* Pricing table */}
      <section className="cl-wrap cl-table-wrap">
        <div className="cl-table">
          {CL_PLANS.map((plan, i) => (
            <ClPlanColumn plan={plan} idx={i} key={plan.name} onSubscribe={onSubscribe} />
          ))}
        </div>
      </section>

      {/* Eligibility */}
      <section className="cl-elig">
        <div className="cl-wrap cl-elig-inner">
          <h2 className="cl-elig-h">Eligibility</h2>
          <p className="cl-elig-p">Civic Lens is available to journalists, researchers, academics, civil society organizations, and other professionals working to understand and combat misinformation. We review all applications to ensure our platform is used responsibly.</p>
        </div>
      </section>

      {/* Footer */}
      <footer className="cl-footer">
        <div className="cl-wrap cl-footer-top">
          <div className="cl-footer-brand">
            <div className="cl-logo">Civic Lens</div>
            <div className="cl-footer-dev">Developed by the <a className="cl-footer-devlink" href="#">Algorithmic Transparency Institute</a><ClChevronRight /></div>
          </div>
          <div className="cl-footer-cols">
            <div className="cl-footer-col">
              <div className="cl-footer-col-h">Product</div>
              <a className="cl-footer-link" href="#">Features<ClChevronRight /></a>
              <a className="cl-footer-link" href="#">Pricing<ClChevronRight /></a>
              <a className="cl-footer-link" href="#">FAQ<ClChevronRight /></a>
            </div>
            <div className="cl-footer-col">
              <div className="cl-footer-col-h">Company</div>
              <a className="cl-footer-link" href="#">About ATI<ClChevronRight /></a>
              <a className="cl-footer-link" href="#">Contact<ClChevronRight /></a>
            </div>
            <div className="cl-footer-col">
              <div className="cl-footer-col-h">Legal</div>
              <a className="cl-footer-link" href="#">Privacy Policy<ClChevronRight /></a>
              <a className="cl-footer-link" href="#">Terms of Service<ClChevronRight /></a>
            </div>
          </div>
        </div>
        <div className="cl-footer-bottom">
          <div className="cl-wrap">© 2026 Algorithmic Transparency Institute. All rights reserved.</div>
        </div>
      </footer>
    </div>
  );
}

</script>
<script type="text/babel">
const MA_POSTS = [
  {
